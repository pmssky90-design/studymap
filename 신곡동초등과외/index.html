<script>
(function() {
  function initLinkToggles() {
    document.querySelectorAll('.link-section-collapsible').forEach(function(section) {
      var button = section.querySelector('.link-more-toggle');
      if (!button) return;
      var items = section.querySelectorAll('li');
      if (items.length <= 30) {
        button.hidden = true;
        return;
      }
      button.addEventListener('click', function() {
        var expanded = section.classList.toggle('is-expanded');
        section.classList.toggle('is-collapsed', !expanded);
        button.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        button.textContent = expanded ? '접기' : '더보기';
      });
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initLinkToggles);
  } else {
    initLinkToggles();
  }
})();
</script>
